<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1409 Admin — Вход</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --accent: #7c5cfc;
      --accent2: #c471ed;
      --bg: #0d0d14;
      --surface: #13131f;
      --border: #1e1e30;
      --text: #e8e8f0;
      --muted: #6b6b8a;
    }

    body {
      min-height: 100vh;
      background: var(--bg);
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', system-ui, sans-serif;
      overflow: hidden;
    }

    .bg-orbs {
      position: fixed; inset: 0; pointer-events: none; z-index: 0;
    }
    .orb {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: .35;
      animation: drift 8s ease-in-out infinite alternate;
    }
    .orb1 { width: 500px; height: 500px; background: var(--accent); top: -100px; left: -100px; animation-delay: 0s; }
    .orb2 { width: 400px; height: 400px; background: var(--accent2); bottom: -80px; right: -80px; animation-delay: 3s; }
    .orb3 { width: 300px; height: 300px; background: #12c2e9; top: 40%; left: 40%; animation-delay: 1.5s; }
    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.08); }
    }

    .card {
      position: relative; z-index: 1;
      background: rgba(19, 19, 31, .85);
      border: 1px solid var(--border);
      backdrop-filter: blur(24px);
      border-radius: 24px;
      padding: 48px 44px;
      width: 420px;
      box-shadow: 0 32px 80px rgba(0,0,0,.5), 0 0 0 1px rgba(124,92,252,.1);
      animation: slideUp .6s cubic-bezier(.22,1,.36,1);
    }
    @keyframes slideUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .logo-wrap {
      display: flex; align-items: center; gap: 12px; margin-bottom: 32px;
    }
    .logo-icon {
      width: 44px; height: 44px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      font-weight: 900; font-size: 18px; color: #fff;
      box-shadow: 0 4px 20px rgba(124,92,252,.4);
    }
    .logo-text { font-size: 22px; font-weight: 700; color: var(--text); }
    .logo-sub  { font-size: 12px; color: var(--muted); margin-top: 1px; }

    h1 { font-size: 26px; font-weight: 700; color: var(--text); margin-bottom: 6px; }
    .subtitle { color: var(--muted); font-size: 14px; margin-bottom: 32px; }

    .field { margin-bottom: 18px; }
    label { display: block; font-size: 12px; font-weight: 600; color: var(--muted); text-transform: uppercase; letter-spacing: .07em; margin-bottom: 8px; }
    input {
      width: 100%; padding: 13px 16px;
      background: rgba(255,255,255,.04);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text); font-size: 15px;
      outline: none;
      transition: border-color .2s, box-shadow .2s;
    }
    input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,92,252,.18);
    }

    .btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      border: none; border-radius: 12px;
      color: #fff; font-size: 16px; font-weight: 600;
      cursor: pointer; margin-top: 8px;
      position: relative; overflow: hidden;
      transition: transform .15s, box-shadow .2s;
      box-shadow: 0 6px 24px rgba(124,92,252,.35);
    }
    .btn:hover { transform: translateY(-2px); box-shadow: 0 10px 32px rgba(124,92,252,.5); }
    .btn:active { transform: translateY(0); }
    .btn .ripple {
      position: absolute; border-radius: 50%;
      background: rgba(255,255,255,.3);
      transform: scale(0); animation: ripple .6s linear;
      pointer-events: none;
    }
    @keyframes ripple {
      to { transform: scale(4); opacity: 0; }
    }

    .error {
      background: rgba(255,80,80,.12);
      border: 1px solid rgba(255,80,80,.3);
      border-radius: 10px; padding: 12px 14px;
      color: #ff8080; font-size: 13px; margin-top: 14px;
      display: none; align-items: center; gap: 8px;
    }
    .error.show { display: flex; }
  </style>
</head>
<body>
  <div class="bg-orbs">
    <div class="orb orb1"></div>
    <div class="orb orb2"></div>
    <div class="orb orb3"></div>
  </div>

  <div class="card">
    <div class="logo-wrap">
      <div class="logo-icon">14</div>
      <div>
        <div class="logo-text">1409 Design</div>
        <div class="logo-sub">Asset Management</div>
      </div>
    </div>

    <h1>Добро пожаловать</h1>
    <p class="subtitle">Войдите в административную панель</p>

    <form id="loginForm">
      <div class="field">
        <label>Логин</label>
        <input type="text" id="login" placeholder="admin" autocomplete="username" required>
      </div>
      <div class="field">
        <label>Пароль</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password" required>
      </div>
      <button type="submit" class="btn" id="submitBtn">Войти</button>
      <div class="error" id="errorMsg">
        <span>⚠️</span><span id="errorText">Ошибка</span>
      </div>
    </form>
  </div>

  <script>
    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submitBtn');
      btn.textContent = 'Входим...';
      btn.disabled = true;

      const res = await fetch('/admin/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
          login: document.getElementById('login').value,
          password: document.getElementById('password').value
        })
      });
      const data = await res.json();
      if (data.ok) {
        window.location.href = '/admin';
      } else {
        const err = document.getElementById('errorMsg');
        document.getElementById('errorText').textContent = data.error || 'Ошибка входа';
        err.classList.add('show');
        btn.textContent = 'Войти';
        btn.disabled = false;
      }
    });

    document.querySelector('.btn').addEventListener('click', function(e) {
      const r = document.createElement('span');
      r.className = 'ripple';
      const rect = this.getBoundingClientRect();
      const size = Math.max(rect.width, rect.height);
      r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX-rect.left-size/2}px;top:${e.clientY-rect.top-size/2}px`;
      this.appendChild(r);
      setTimeout(() => r.remove(), 600);
    });
  </script>
</body>
</html>
