<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1409 Admin — Вход</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
  <link rel="stylesheet" href="/static/1409.css">
  <style>
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
    }
    .login-wrap {
      width: min(420px, 100%);
      animation: p1409-fade-up 0.6s cubic-bezier(0.22,1,0.36,1);
    }
    .logo-row {
      display: flex; justify-content: center;
      margin-bottom: 32px;
    }
    .login-title {
      text-align: center;
      font-size: 1.6rem; font-weight: 700;
      background: linear-gradient(135deg, #fff 0%, rgba(255,255,255,0.65) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 6px;
    }
    .login-sub {
      text-align: center;
      color: var(--text-muted); font-size: 0.875rem;
      margin-bottom: 32px;
    }
    .error-msg {
      display: flex; align-items: center; gap: 8px;
      background: var(--error-bg); border: 1px solid var(--error-border);
      border-radius: var(--radius-md); padding: 12px 14px;
      color: var(--error); font-size: 0.85rem;
      margin-top: 12px; display: none;
    }
    .error-msg.show { display: flex; }
  </style>
</head>
<body class="p1409-bg">

<div class="login-wrap">
  <div class="logo-row">
    <div class="p1409-logo">
      <div class="p1409-logo-icon">1409</div>
      <div>
        <div class="p1409-logo-text">Design System</div>
        <div class="p1409-logo-sub">Asset Management</div>
      </div>
    </div>
  </div>

  <div class="p1409-card">
    <div class="login-title">Добро пожаловать</div>
    <div class="login-sub">Войдите в административную панель</div>

    <form id="loginForm">
      <div class="p1409-form-group">
        <label class="p1409-label"><i class="fas fa-user"></i> &nbsp;Логин</label>
        <input class="p1409-input" type="text" id="login"
               placeholder="admin" autocomplete="username" required>
      </div>
      <div class="p1409-form-group">
        <label class="p1409-label"><i class="fas fa-lock"></i> &nbsp;Пароль</label>
        <input class="p1409-input" type="password" id="password"
               placeholder="••••••••" autocomplete="current-password" required>
      </div>

      <button type="submit" class="p1409-btn p1409-btn-primary p1409-btn-full p1409-btn-lg" id="submitBtn">
        <i class="fas fa-sign-in-alt"></i> Войти
      </button>

      <div class="error-msg" id="errorMsg">
        <i class="fas fa-exclamation-circle"></i>
        <span id="errorText">Ошибка</span>
      </div>
    </form>
  </div>

  <p style="text-align:center;margin-top:16px;font-size:0.75rem;color:var(--text-muted)">
    api.my1409.ru &nbsp;·&nbsp; 1409 Design System
  </p>
</div>

<script>
  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    btn.innerHTML = '<span class="p1409-spinner"></span> Входим...';
    btn.disabled = true;

    const res = await fetch('/admin/login', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        login: document.getElementById('login').value,
        password: document.getElementById('password').value
      })
    });
    const data = await res.json();
    if (data.ok) {
      window.location.href = '/admin';
    } else {
      const err = document.getElementById('errorMsg');
      document.getElementById('errorText').textContent = data.error || 'Ошибка входа';
      err.classList.add('show');
      btn.innerHTML = '<i class="fas fa-sign-in-alt"></i> Войти';
      btn.disabled = false;
    }
  });
</script>
</body>
</html>
